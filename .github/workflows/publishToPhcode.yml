name: Publish extension to Brackets/phcode.dev extension store
# https://docs.github.com/en/actions/using-workflows/events-that-trigger-workflows#release
on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.6.0)'
        required: true
        default: 'v0.6.0'
jobs:
  build-tasks:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Validate release tag version
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          PKG_VERSION=$(node -p 'require("./package.json").version')
          if [ "$TAG" != "$PKG_VERSION" ] && [ "$TAG" != "v$PKG_VERSION" ]; then
            echo "Tag '$TAG' does not match version '$PKG_VERSION' in package.json"
            exit 1
          fi
      - name: Build extension.zip
        run: |
          zip -r extension.zip . \
            --exclude '*.git*' \
            --exclude '.github/*' \
            --exclude 'node_modules/*' \
            --exclude 'extension.zip'
      - name: Upload extension.zip to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          gh release upload "${TAG}" extension.zip --clobber
      - name: release details
        run: |
          GITHUB_REF="refs/tags/${{ github.event.inputs.tag || github.ref_name }}"
          echo "$GITHUB_REF repo=${{github.event.repository.full_name}}"
          curl --fail-with-body https://publish.phcode.dev/publishGithubRelease?releaseRef=${{github.event.repository.full_name}}:$GITHUB_REF
