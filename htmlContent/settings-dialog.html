<div class="brackets-terminal-settings-dialog modal">
    <div class="modal-header">
        <span class="title">Brackets terminal settings</span>
    </div>
    <div class="modal-body no-padding ">
        <p>No Phoenix Desktop o terminal usa backend local automaticamente. Os campos abaixo controlam a conexão remota (tty.js) e a aparência.</p>
        <label for="backendMode">Modo do backend:</label>
        <select name="backendMode" id="backendMode">
            <option value="auto" {{#backendMode_auto}}selected{{/backendMode_auto}}>Auto (local ou remoto)</option>
            <option value="local-node" {{#backendMode_localNode}}selected{{/backendMode_localNode}}>Local (node-pty)</option>
            <option value="remote-tty" {{#backendMode_remoteTty}}selected{{/backendMode_remoteTty}}>Remoto (tty.js)</option>
        </select>
        <br/>
        <label for="host">Host remoto:</label>
        <input type="text" name="host" id="host" value="{{host}}" />
        <br/>
        <label for="port">Porta:</label>
        <input type="text" name="port" id="port" value="{{port}}" />
        <br/>
        <label for="fontSize">Tamanho da fonte:</label>
        <input type="text" name="fontSize" id="fontSize" value="{{fontSize}}" />
        <br/>
        <label>
            <input type="checkbox" name="webFallbackEnabled" id="webFallbackEnabled" {{#webFallbackEnabled}}checked{{/webFallbackEnabled}} />
            Ativar fallback web (modo remoto se a conexão local falhar)
        </label>
        <br/>
        <label for="connectTimeoutMs">Timeout de conexão (ms):</label>
        <input type="text" name="connectTimeoutMs" id="connectTimeoutMs" value="{{connectTimeoutMs}}" />
    </div>
    <div class="modal-footer">
        <button class="dialog-button btn" id="brackets-terminal-save">Save</button>
        <button class="dialog-button btn primary" data-button-id="close">Cancel</button>
    </div>
</div>
