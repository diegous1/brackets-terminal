<div class="brackets-terminal-settings-dialog modal">
    <div class="modal-header">
        <span class="title">Brackets terminal settings</span>
    </div>
    <div class="modal-body no-padding ">No Phoenix Desktop o terminal usa backend local automaticamente. O campo abaixo define a porta usada quando o modo remoto (tty.js) estiver ativo. Se necessário, inicie com <code>tty.js --port &lt;PORT_NUMBER&gt;</code>.

<!--        <label for="port">Port:</label>-->
        <input type="text" name="port" value="{{port}}" />
    </div>
    <div class="modal-footer">
        <button class="dialog-button btn" id="brackets-terminal-save">Save</button>
        <button class="dialog-button btn primary" data-button-id="close">Cancel</button>
    </div>
</div>
